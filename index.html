<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Zoe - INNERHOWS</title>
    <style>
        :root {
            --env-color: #721c24;
            --env-light: #8b252e;
            --gold: #d4af37;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            background-color: #e8e2db; overflow: hidden; font-family: sans-serif;
            touch-action: none;
        }

        .page-title {
            margin-top: 40px; font-size: 26px; font-weight: bold;
            color: #4a3728; letter-spacing: 5px; z-index: 10;
        }

        /* 互動舞台：維持你提供的原始設定 */
        .stage {
            position: relative; width: 340px; height: 220px;
            margin-top: 220px; display: flex; justify-content: center;
        }

        .leather-texture {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; opacity: 0.25; z-index: 5;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .env-body {
            position: absolute; bottom: 0; width: 340px; height: 220px;
            background: var(--env-color); border-radius: 0 0 5px 5px; z-index: 30;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; cursor: pointer;
        }

        .brand { color: var(--gold); font-weight: bold; font-size: 18px; letter-spacing: 2px; margin-top: 95px; z-index: 31; }
        .from { color: var(--gold); font-size: 12px; position: absolute; bottom: 15px; font-weight: bold; z-index: 31; }

        /* === 核心：完全保留你提供的正確定位三角形 === */
        .flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 170px solid transparent; border-right: 170px solid transparent;
            border-top: 110px solid var(--env-light);
            transform-origin: top; transition: transform 0.6s ease;
            z-index: 40; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
            cursor: pointer;
        }

        #card {
            position: absolute; top: 10px; left: 15px; width: 310px; height: auto;
            border-radius: 2px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 20; opacity: 0;
            transform: translateY(0);
            transition: opacity 0.5s ease;
            cursor: grab; touch-action: none;
        }

        .is-open .flap { transform: rotateX(180deg); z-index: 5; }
        .is-open #card { opacity: 1; }

        #card.dragging { transition: none !important; }

        /* 放大置中效果 */
        #card.is-maximized {
            position: fixed !important; top: 50% !important; left: 50% !important;
            width: min(92vw, 420px) !important;
            transform: translate(-50%, -50%) !important;
            z-index: 2000 !important; box-shadow: 0 0 100px rgba(0,0,0,0.6);
            border-radius: 8px; cursor: pointer;
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            opacity: 0; pointer-events: none; transition: 0.35s; z-index: 1500;
        }
        body.max-mode .overlay { opacity: 1; pointer-events: auto; }

        .hint { margin-top: 16px; color: #6e6257; font-size: 13px; }
    </style>
</head>
<body id="mainBody">

    <div class="overlay" id="overlay"></div>
    <div class="page-title">For Zoe</div>

    <div class="stage" id="mainStage">
        <div class="flap" id="envFlap"><div class="leather-texture"></div></div>
        <img src="card.jpg" id="card" alt="card">
        <div class="env-body" id="envBody">
            <div class="leather-texture"></div>
            <div class="brand">INNERHOWS</div>
            <div class="from">From Razel</div>
        </div>
    </div>

    <div class="hint" id="hint">點開信封後，往上滑出卡片</div>

    <script>
        const stage = document.getElementById('mainStage');
        const card = document.getElementById('card');
        const overlay = document.getElementById('overlay');
        const body = document.getElementById('mainBody');
        const flap = document.getElementById('envFlap');
        const env = document.getElementById('envBody');
        const hint = document.getElementById('hint');

        let step = 0; // 0=closed, 1=open, 2=pulled, 3=max
        let isDragging = false;
        let startY = 0;
        let currentPull = -40; 
        const minPull = -40;
        const maxPull = -240;
        const triggerPull = -170;

        function setCardTranslate(y) {
            card.style.transform = `translateY(${y}px)`;
        }

        function handleOpen(e) {
            if (e) e.stopPropagation();
            if (step !== 0) return;
            stage.classList.add('is-open');
            step = 1;
            setCardTranslate(minPull);
            hint.textContent = '往上滑卡片';
        }

        flap.onclick = handleOpen;
        env.onclick = handleOpen;

        function getY(e) { return e.touches ? e.touches[0].clientY : e.clientY; }

        function startDrag(e) {
            if (step !== 1) return;
            isDragging = true;
            startY = getY(e);
            card.classList.add('dragging');
        }

        function moveDrag(e) {
            if (!isDragging || step !== 1) return;
            const delta = getY(e) - startY;
            let nextY = minPull + delta;
            if (nextY < maxPull) nextY = maxPull;
            if (nextY > minPull) nextY = minPull;
            currentPull = nextY;
            setCardTranslate(currentPull);
        }

        function endDrag() {
            if (!isDragging || step !== 1) return;
            isDragging = false;
            card.classList.remove('dragging');
            if (currentPull <= triggerPull) {
                step = 2;
                currentPull = maxPull;
                setCardTranslate(currentPull);
                hint.textContent = '點卡片放大';
            } else {
                currentPull = minPull;
                card.style.transition = 'transform 0.4s ease';
                setCardTranslate(currentPull);
            }
        }

        card.addEventListener('touchstart', startDrag);
        window.addEventListener('touchmove', moveDrag, { passive: false });
        window.addEventListener('touchend', endDrag);
        card.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('mouseup', endDrag);

        card.onclick = function(e) {
            if (step === 2) {
                body.classList.add('max-mode');
                card.classList.add('is-maximized');
                step = 3;
            } else if (step === 3) {
                closeMax();
            }
        };

        function closeMax() {
            body.classList.remove('max-mode');
            card.classList.remove('is-maximized');
            step = 2;
        }
        overlay.onclick = closeMax;
    </script>
</body>
</html>
